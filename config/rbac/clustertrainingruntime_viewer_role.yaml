# This rule is not used by the project kubeflow-coach itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to coach.coach.kubeflow.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubeflow-coach
    app.kubernetes.io/managed-by: kustomize
  name: clustertrainingruntime-viewer-role
rules:
- apiGroups:
  - coach.coach.kubeflow.io
  resources:
  - clustertrainingruntimes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coach.coach.kubeflow.io
  resources:
  - clustertrainingruntimes/status
  verbs:
  - get
