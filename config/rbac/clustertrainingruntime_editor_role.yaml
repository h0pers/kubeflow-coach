# This rule is not used by the project kubeflow-coach itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the coach.coach.kubeflow.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubeflow-coach
    app.kubernetes.io/managed-by: kustomize
  name: clustertrainingruntime-editor-role
rules:
- apiGroups:
  - coach.coach.kubeflow.io
  resources:
  - clustertrainingruntimes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coach.coach.kubeflow.io
  resources:
  - clustertrainingruntimes/status
  verbs:
  - get
