apiVersion: coach.coach.kubeflow.io/v1alpha1
kind: ClusterTrainingRuntime
metadata:
  name: simple-training
spec:
  numNodes: 2
  template:
    spec:
      containers:
        - name: trainer
          image: busybox:latest
          command: ["sh", "-c", "echo 'Training on node' && sleep 10 && echo 'Done'"]
      restartPolicy: Never